<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>H.A.W.K | Flight Planner</title>

<!-- Map library -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar */
#panel {
  width: 300px;
  background: #0e1118;
  color: #c8d8e8;
  padding: 10px;
  box-sizing: border-box;
  overflow-y: auto;
}

h2 {
  margin-top: 0;
  color: #00c8ff;
}

button {
  width: 100%;
  padding: 8px;
  margin-top: 10px;
  background: #1e2a38;
  color: white;
  border: 1px solid #00c8ff;
  cursor: pointer;
}

button:hover {
  background: #00c8ff;
  color: black;
}

/* Map */
#map {
  flex: 1;
}
</style>
</head>

<body>

<!-- LEFT PANEL -->
<div id="panel">
  <h2>H.A.W.K FLIGHT PLANNER</h2>

  <p><b>Instructions:</b></p>
  <p>Click on the map to add waypoints.</p>

  <button onclick="clearRoute()">Clear Route</button>

  <h3>Route Data</h3>
  <div id="info">No route yet</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([52.2, 5.3], 7); // Netherlands view

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let waypoints = [];
let line = null;

function updateRoute() {
  if (line) map.removeLayer(line);

  if (waypoints.length < 2) {
    document.getElementById("info").innerText = "Need at least 2 points";
    return;
  }

  line = L.polyline(waypoints, {color: 'red'}).addTo(map);

  let distance = 0;
  for (let i = 1; i < waypoints.length; i++) {
    distance += map.distance(waypoints[i-1], waypoints[i]);
  }

  document.getElementById("info").innerHTML =
    "Waypoints: " + waypoints.length + "<br>" +
    "Distance: " + (distance / 1000).toFixed(2) + " km";
}

map.on('click', function(e) {
  waypoints.push([e.latlng.lat, e.latlng.lng]);

  L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);

  updateRoute();
});

function clearRoute() {
  waypoints = [];
  map.eachLayer(layer => {
    if (layer instanceof L.Marker || layer instanceof L.Polyline) {
      map.removeLayer(layer);
    }
  });

  document.getElementById("info").innerText = "No route yet";
}
</script>

</body>
</html>
