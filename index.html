<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>H.A.W.K Flight Planner</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; display:flex; height:100vh; }
#panel { width:280px; background:#0e1118; color:#c8d8e8; padding:10px; }
#map { flex:1; }
button { width:100%; padding:8px; margin-top:10px; }
</style>
</head>

<body>

<div id="panel">
  <h3>H.A.W.K Planner</h3>
  <p>Click map to add points</p>
  <button onclick="clearRoute()">Clear</button>
  <div id="info">No route</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const map = L.map('map').setView([52.2, 5.3], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let points = [];
  let line = null;
  let markers = [];

  function update() {
    if (line) map.removeLayer(line);

    if (points.length < 2) return;

    line = L.polyline(points, {color:'red'}).addTo(map);

    let dist = 0;
    for (let i=1;i<points.length;i++){
      dist += map.distance(points[i-1], points[i]);
    }

    document.getElementById("info").innerText =
      "Points: " + points.length +
      " | Distance: " + (dist/1000).toFixed(2) + " km";
  }

  map.on('click', function(e){
    const p = [e.latlng.lat, e.latlng.lng];
    points.push(p);

    const m = L.marker(p).addTo(map);
    markers.push(m);

    update();
  });

  window.clearRoute = function(){
    points = [];
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    if (line) map.removeLayer(line);
    document.getElementById("info").innerText = "No route";
  };

});
</script>

</body>
</html>
