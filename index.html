<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.A.W.K | Holomap Air Warfare & Kinetics</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #0a0c10;
  --panel: #0e1118;
  --border: #1e2a38;
  --accent: #00c8ff;
  --text: #c8d8e8;
  --dim: #4a5a6a;
  --panel-w: 220px;
  --top-h: 44px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* TOP BAR */
#topbar {
  height: var(--top-h);
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 2px;
  font-size: 14px;
}

/* MAIN LAYOUT */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* LEFT PANEL */
#left-panel {
  width: var(--panel-w);
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 10px;
}

.panel-section h3 {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

/* CENTER AREA */
#center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.card {
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 6px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">H.A.W.K</div>
</div>

<!-- MAIN AREA -->
<div id="main">

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-section">
      <h3>SYSTEM STATUS</h3>
      <p>Online</p>
    </div>

    <div class="panel-section">
      <h3>TOOLS</h3>
      <p>Ready</p>
    </div>
  </div>

  <!-- CENTER AREA -->
  <div id="center">
    <div class="card">
      <h1>H.A.W.K SYSTEM ONLINE</h1>
      <p>Holomap Air Warfare & Kinetics</p>
    </div>
  </div>

</div>

</body>
</html>
